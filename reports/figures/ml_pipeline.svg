<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360">
<rect width="100%" height="100%" fill="white"/>
<text x="500" y="35" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Future ML pipeline: train only after verified reports exist</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333" /></marker></defs>
<g font-family="Arial" font-size="15">
<rect x="60" y="110" width="170" height="90" rx="12" fill="#eef2ff" stroke="#4d6fb3"/><text x="145" y="145" text-anchor="middle">Verified outage</text><text x="145" y="170" text-anchor="middle">reports + notices</text>
<rect x="300" y="110" width="170" height="90" rx="12" fill="#eef2ff" stroke="#4d6fb3"/><text x="385" y="145" text-anchor="middle">Feature vector</text><text x="385" y="170" text-anchor="middle">x = time, place, weather</text>
<rect x="540" y="90" width="190" height="130" rx="12" fill="#eef2ff" stroke="#4d6fb3"/><text x="635" y="125" text-anchor="middle">Logistic model</text><text x="635" y="152" text-anchor="middle">P(outage)=σ(β₀+βᵀx)</text><text x="635" y="182" text-anchor="middle">Duration model</text><text x="635" y="207" text-anchor="middle">ŷ=β₀+βᵀx</text>
<rect x="800" y="110" width="150" height="90" rx="12" fill="#eef2ff" stroke="#4d6fb3"/><text x="875" y="145" text-anchor="middle">Dashboard</text><text x="875" y="170" text-anchor="middle">risk + explanation</text>
<line x1="230" y1="155" x2="300" y2="155" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/><line x1="470" y1="155" x2="540" y2="155" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/><line x1="730" y1="155" x2="800" y2="155" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<text x="500" y="285" text-anchor="middle" font-size="16">This project does not pretend that a production ML model exists before enough real event-level data exists.</text>
</g></svg>
